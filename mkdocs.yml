site_name: "SRE Best Practices \u2014 How We Do Things"
site_description: SRE knowledge transfer sessions for OpenShift Container Platform
site_author: Rohit Bhilare
repo_url: https://github.com/rbhilare/sre-functions
repo_name: rbhilare/sre-functions

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - header.autohide
    - announce.dismiss
  icon:
    repo: fontawesome/brands/github
    logo: material/shield-check

plugins:
  - search
  - tags

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.mark
  - pymdownx.keys
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: "\u26D3\uFE0F"
      toc_depth: 3
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rbhilare/sre-functions
      name: GitHub Repository
    - icon: fontawesome/brands/redhat
      link: https://www.redhat.com
      name: Red Hat
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/rohit-bhilare/
      name: LinkedIn
  generator: false

extra_css:
  - stylesheets/extra.css

copyright: "&copy; 2026 Red Hat, Inc. &mdash; SRE Hybrid Platforms &bull; Built with &#10084; by Rohit Bhilare"

nav:
  - Home: index.md
  - Session Plan: sessions/00-MASTER-SESSION-PLAN.md
  - Content Sessions:
      - "Session 1: Reliability Across Layers": sessions/01-RELIABILITY-ACROSS-LAYERS.md
      - "Session 2: Follow-the-Sun Model": sessions/02-FOLLOW-THE-SUN-MODEL.md
      - "Session 4: How We Run SRE": sessions/04-HOW-WE-RUN-SRE.md
      - "Session 5: How We Operate OCP Clusters": sessions/05-HOW-WE-OPERATE-OCP-CLUSTERS.md
      - "Session 7: How We Monitor and Alert": sessions/07-HOW-WE-MONITOR-AND-ALERT.md
      - "Session 8: How We Handle Incidents": sessions/08-HOW-WE-HANDLE-INCIDENTS.md
      # Sessions 10-14 will be added progressively
  - "Q&A Sessions":
      - "Session 3: Ask & Discuss (Sessions 1\u20132)": sessions/03-INSIDE-SRE-ASK-AND-DISCUSS.md
      - "Session 6: Ask & Discuss (Sessions 4\u20135)": sessions/06-INSIDE-SRE-ASK-AND-DISCUSS.md
      - "Session 9: Ask & Discuss (Sessions 7\u20138)": sessions/09-INSIDE-SRE-ASK-AND-DISCUSS.md
